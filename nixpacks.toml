providers = ["node", "python"]

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.build]
cmds = [
  "cd app/frontend && rm -rf node_modules package-lock.json && npm install && npm run build",
  "cd app/backend && pip install -r requirements.txt"
]

[start]
cmd = "cd app/backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
